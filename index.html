<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бюджет</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Шапка -->
  <header class="topbar">
    <h1>Бюджет</h1>
  </header>

  <main class="page">

    <!-- Ручной ввод расхода -->
    <section class="card expense-input">
      <input type="number" id="expenseAmount" class="expense-amount" placeholder="0">
      <select class="currency-select">
        <option value="RUB" selected>руб.</option>
      </select>
      <select id="expenseCategory" class="expense-select"></select>
      <select id="expenseAccount" class="expense-select"></select>
      <button class="btn btn-primary" id="addExpenseBtn">Добавить расход</button>
    </section>

    <!-- Два блока: бюджет и кошелёк -->
    <div class="columns">

      <!-- Бюджет на месяц -->
      <section class="card budget">
        <h2>Твой бюджет на месяц</h2>
        <ul class="list" id="categoriesList"></ul>
        <div class="add-row">
          <input type="text" id="newCategoryName" placeholder="Название категории">
          <input type="number" id="newCategoryPlanned" placeholder="0">
          <button class="btn btn-primary" id="addCategoryBtn">+</button>
        </div>
      </section>

      <!-- Кошелёк -->
      <section class="card wallet">
        <h2>Кошелёк</h2>
        <div class="wallet-total" id="walletTotal">0</div>
        <ul class="list accounts" id="accountsList"></ul>
        <div class="add-row">
          <input type="text" id="newAccountName" placeholder="Название счёта">
          <input type="number" id="newAccountBalance" placeholder="0">
          <button class="btn btn-primary" id="addAccountBtn">+</button>
        </div>
      </section>

    </div>

    <!-- Желаемые сбережения -->
    <section class="card savings">
      <span class="savings-arrow">↓</span>
      <span class="savings-label">Желаемые сбережения</span>
      <input type="number" id="savingsValue" class="savings-value">
    </section>

    <!-- Предупреждение: категории + сбережения > Кошелёк -->
    <section class="card warning" id="warningCard" hidden>
      <span id="warningText"></span>
    </section>

    <!-- Цели -->
    <section class="card goals">
      <h2>Цели <span class="muted small">(сверху — самая важная)</span></h2>
      <ul class="list goals-list" id="goalsList"></ul>
      <div class="add-row">
        <input type="text" id="newGoalName" placeholder="Название цели">
        <input type="number" id="newGoalTarget" placeholder="Цель, ₽">
        <button class="btn btn-primary" id="addGoalBtn">+</button>
      </div>
    </section>

    <!-- Прикрепить выписку -->
    <section class="card attach">
      <button class="btn btn-attach">Прикрепить выписку PDF</button>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
